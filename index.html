<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Masonic Convention Portal</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #fcfcfc;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
            opacity: 0;
            transition: opacity 0.5s ease-in-out;
        }
    </style>
</head>
<body>
    
    <iframe 
        id="gas-frame"
        allow="geolocation; microphone; camera; clipboard-read; clipboard-write"
        sandbox="allow-forms allow-scripts allow-same-origin allow-popups allow-downloads allow-top-navigation-by-user-activation">
    </iframe>

    <script>
        const gasLink = "https://script.google.com/macros/s/AKfycbygfPFQAeV1JfNnQfgblAAFrJI5nCUQ09qAruwLqBgqDVj7d_snM86ueQqGEIEX7NMe/exec";
        const iframe = document.getElementById('gas-frame');

        iframe.src = gasLink + "?t=" + Date.now();

        iframe.onload = function() {
            iframe.style.opacity = '1';
        };

        window.addEventListener('message', function(event) {
            if (event.data && event.data.action === 'redirect') {
                
                if (event.source) {
                    event.source.postMessage('vercel_ack', '*');
                }
                
                const url = event.data.url;
                if (url) {
                    iframe.style.opacity = '0';
                    setTimeout(() => {
                        iframe.src = url.includes('?') ? url + "&t=" + Date.now() : url + "?t=" + Date.now();
                    }, 500);
                }
            }
        });
    </script>

</body>
</html>
