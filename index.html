<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Masonic Convention Portal</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Poppins:wght@300;400;500;600;700&family=Spectral+SC:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #fcfcfc;
            --text-color: #94a3b8;
            --primary-accent: #1b1afa;
            --secondary-accent: #ffd422;
            --core-glow: rgba(255, 212, 34, 0.6);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #0f172a;
                --text-color: #64748b;
                --primary-accent: #1b1afa; 
                --secondary-accent: #ffd422; 
                --core-glow: rgba(255, 212, 34, 0.4);
            }
        }

        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: 'Poppins', sans-serif;
            transition: background-color 0.3s ease;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
            opacity: 0;
            transition: opacity 0.6s ease-in-out;
        }

        #loader {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 24px;
            z-index: 9999;
            transition: opacity 0.5s ease-out, visibility 0.5s;
        }

        .modern-loader {
            position: relative;
            width: 64px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .orbit-outer {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            border: 4px solid #f1f5f9; /* slate-100 */
            border-top-color: var(--primary-accent);
            animation: spin 1s linear infinite;
        }

        .core {
            width: 16px;
            height: 16px;
            background-color: var(--secondary-accent);
            border-radius: 50%;
            animation: pulse-core 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        .text-container {
            display: flex;
            align-items: center;
            color: var(--text-color);
            font-family: 'Poppins', sans-serif;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.4em;
            text-transform: uppercase;
        }

        .text-container::after {
            content: '';
            animation: typing 1.5s steps(4, end) infinite;
            display: inline-block;
            width: 16px; 
            text-align: left;
        }

        /* Keyframes */
        @keyframes spin { 
            0% { transform: rotate(0deg); } 
            100% { transform: rotate(360deg); } 
        }
        
        @keyframes pulse-core { 
            0%, 100% { opacity: 1; } 
            50% { opacity: .3; } 
        }

        @keyframes typing {
            0% { content: ''; }
            25% { content: '.'; }
            50% { content: '..'; }
            75% { content: '...'; }
            100% { content: ''; }
        }
    </style>
</head>
<body>

    <div id="loader">
        <div class="modern-loader">
            <div class="orbit-outer"></div>
            <div class="core"></div>
        </div>
        <div class="text-container" id="loadingText">Initializing</div>
    </div>

    <script>
        const gasLink = "https://script.google.com/macros/s/AKfycby63vWx4naRaidzzSYu4rq_pgc05g_9v7HsPYnAP067oKuj8YFm4rlAjK8v25rDyBQ/exec";

        const formLink = gasLink + "?page=form";

        const loader = document.getElementById('loader');

        const frameMain = document.createElement('iframe');
        frameMain.id = 'frame-main';
        frameMain.allow = "geolocation; microphone; camera; clipboard-read; clipboard-write";
        frameMain.setAttribute('sandbox', 'allow-forms allow-scripts allow-same-origin allow-popups allow-downloads allow-top-navigation-by-user-activation');

        const frameForm = document.createElement('iframe');
        frameForm.id = 'frame-form';
        frameForm.allow = "geolocation; microphone; camera; clipboard-read; clipboard-write";
        frameForm.setAttribute('sandbox', 'allow-forms allow-scripts allow-same-origin allow-popups allow-downloads allow-top-navigation-by-user-activation');
        frameForm.style.display = 'none'; 

        document.body.appendChild(frameMain);
        document.body.appendChild(frameForm);

        let isFirstLoad = true;

        frameMain.src = gasLink + "?t=" + Date.now();

        frameMain.onload = function() {
            setTimeout(() => {
                loader.style.opacity = '0';
                frameMain.style.display = 'block';
                frameMain.style.opacity = '1'; 
                setTimeout(() => {
                    loader.style.visibility = 'hidden';
                    loader.style.display = 'none';
                }, 500);
            }, 300);

            if (isFirstLoad) {
                isFirstLoad = false;
                setTimeout(() => { frameForm.src = formLink + "&t=" + Date.now(); }, 1500); 
            }
        };

        window.addEventListener('message', function(event) {
            if (event.data && event.data.action === 'redirect') {

                if (event.source) {
                    event.source.postMessage('vercel_ack', '*');
                }
                
                const url = event.data.url;

                if (url.includes('page=form')) {
                    frameMain.style.opacity = '0';
                    setTimeout(() => {
                        frameMain.style.display = 'none';
                        frameForm.style.display = 'block';
                        requestAnimationFrame(() => frameForm.style.opacity = '1');
                    }, 600);
                }
                
                else if (url.includes('page=admin')) {
                    loader.style.display = 'flex'; loader.style.visibility = 'visible'; loader.style.opacity = '1';
                    frameMain.style.opacity = '0'; frameForm.style.display = 'none';
                    setTimeout(() => { frameMain.src = url + "&t=" + Date.now(); }, 300);
                }

                else {
                    if (frameForm.style.display === 'block') {
                        frameForm.style.opacity = '0';
                        setTimeout(() => {
                            frameForm.style.display = 'none';
                            frameMain.style.display = 'block';
                            requestAnimationFrame(() => frameMain.style.opacity = '1');
                            frameForm.src = formLink + "&t=" + Date.now();
                        }, 600);
                    } else {
                        loader.style.display = 'flex'; loader.style.visibility = 'visible'; loader.style.opacity = '1';
                        frameMain.style.opacity = '0';
                        setTimeout(() => { frameMain.src = gasLink + "?t=" + Date.now(); }, 300);
                    }
                }
            }
        });
    </script>

</body>
</html>
